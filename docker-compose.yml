  client:
    build:
      context: ./client
      args:
        LOGS_DIR: ${INTERNAL_LOGS_DIR:-/usr/src/client/logs}
        DB_HOST: gsabot-db
        DB_PORT: ${DB_PORT}
        DB_USER: ${DB_USER}
        DB_PASSWORD: ${DB_PASSWORD}
        DB_NAME: ${DB_NAME}
        CLIENT_ID: ${CLIENT_ID}
        GUILD_ID: ${GUILD_ID}
        DISCORD_TOKEN: ${DISCORD_TOKEN}
        DOMAIN: ${DOMAIN}
        MINECRAFT_SUBDOMAIN: ${MINECRAFT_SUBDOMAIN}
        SERVER_SUBDOMAIN: ${SERVER_SUBDOMAIN}
        SCHOOL: ${SCHOOL}
        SCHOOL_CODE: ${SCHOOL_CODE}
        REGISTER: ${REGISTER}
        GSA_BANNER: ${GSA_BANNER}
    container_name: gsabot-client
    environment:
      TZ: America/New_York
    restart: unless-stopped
    depends_on:
      - db
    volumes:
      - /opt/data/gsabot/client/logs:${INTERNAL_LOGS_DIR:-/usr/src/client/logs}
      - ./fonts:/usr/src/client/fonts
    networks:
      - gsabot_internal

networks:
  gsabot_internal:
    name: gsabot_internal
    driver: bridge
